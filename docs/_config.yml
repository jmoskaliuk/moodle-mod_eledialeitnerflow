title: LeitnerFlow
description: Professionelle Produkt- und Dokumentationsseite fuer das Moodle-Plugin LeitnerFlow.
theme: minima
lang: de
show_excerpts: false

minima:
  skin: classic

header_pages:
  - teacher-guide.md
  - admin-guide.md
  - student-guide.md
  - configuration.md
  - troubleshooting.md
  - faq.md

markdown: kramdown
kramdown:
  input: GFM

sass:
  style: compressed

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: page
